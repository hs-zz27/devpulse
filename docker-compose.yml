services:
  api:
    image: ghcr.io/hs-zz27/devpulse/devpulse-api:latest
    container_name: devpulse_api
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    image: ghcr.io/hs-zz27/devpulse/devpulse-worker:latest
    container_name: devpulse_worker
    env_file:
      - .env
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: devpulse_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
