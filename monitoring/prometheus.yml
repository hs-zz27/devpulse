global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the DevPulse API for metrics
  - job_name: 'devpulse-api'
    static_configs:
      - targets: ['api:8000']  # Container name in docker-compose
    metrics_path: '/metrics'   # FastAPI Prometheus endpoint

  - job_name: devpulse-worker
    static_configs:
      - targets: ["worker:9001"] 
      
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
